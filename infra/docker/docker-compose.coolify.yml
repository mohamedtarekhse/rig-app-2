services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    environment:
      WEB_PORT: 5173
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      API_PORT: 3000
      DATABASE_URL: mysql://rigways:rigways@mysql:3306/rigways_acm
      DIRECT_DATABASE_URL: mysql://root:root@mysql:3306/rigways_acm
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
    depends_on:
      - mysql
      - redis
      - minio

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: mysql://rigways:rigways@mysql:3306/rigways_acm
      DIRECT_DATABASE_URL: mysql://root:root@mysql:3306/rigways_acm
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
    depends_on:
      - mysql
      - redis
      - minio

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rigways_acm
      MYSQL_USER: rigways
      MYSQL_PASSWORD: rigways
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  redis-data:
  minio-data:
